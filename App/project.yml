name: TubeBackdrop
options:
  bundleIdPrefix: com.tubebackdrop
  deploymentTarget:
    macOS: "13.0"
  # CI uses GitHub-hosted macOS images; pin format so brew XcodeGen cannot emit objectVersion 77 older Xcode cannot open.
  projectFormat: xcode15_0
  xcodeVersion: "15.0"
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.11"
    CURRENT_PROJECT_VERSION: "12"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_ENTITLEMENTS: TubeBackdrop.entitlements

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.4

targets:
  TubeBackdrop:
    type: application
    platform: macOS
    sources:
      - path: ../Sources/TubeBackdrop
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Sparkle
        product: Sparkle
        embed: false
    postCompileScripts:
      - name: Embed Sparkle.framework
        basedOnDependencyAnalysis: false
        shell: /bin/bash
        script: |
          set -eo pipefail
          # SourcePackages lives next to Build/ under the DerivedData project dir.
          # BUILD_DIR is usually .../Build/Products/Release — need three levels up, not two.
          FW=""
          for ROOT_CAND in "${TARGET_BUILD_DIR}/../../.." "${BUILD_DIR}/../../.." "${BUILD_DIR}/../.."; do
            [[ -d "$ROOT_CAND" ]] || continue
            CAND=$(find "$ROOT_CAND/SourcePackages/artifacts" -path "*/Sparkle.xcframework/*/Sparkle.framework" -type d 2>/dev/null | head -1)
            if [[ -n "$CAND" && -d "$CAND" ]]; then
              FW="$CAND"
              break
            fi
          done
          if [[ -z "${FW:-}" || ! -d "$FW" ]]; then
            echo "error: Could not locate Sparkle.framework under SourcePackages/artifacts"
            echo "hint: TARGET_BUILD_DIR=$TARGET_BUILD_DIR BUILD_DIR=$BUILD_DIR"
            exit 1
          fi
          APP="${TARGET_BUILD_DIR}/${WRAPPER_NAME}"
          DEST="${APP}/Contents/Frameworks"
          mkdir -p "$DEST"
          rsync -a "$FW" "$DEST/"
    settings:
      base:
        PRODUCT_NAME: TubeBackdrop
        PRODUCT_BUNDLE_IDENTIFIER: com.tubebackdrop.TubeBackdrop
        INFOPLIST_FILE: Info.plist
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: TubeBackdrop.entitlements

schemes:
  TubeBackdrop:
    build:
      targets:
        TubeBackdrop: all
